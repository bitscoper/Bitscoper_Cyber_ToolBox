# By Abdullah As-Sadeed

name: Build and Release
on:
  push:
    branches:
      - "main"
jobs:
  build-for-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y ninja-build libgtk-3-dev
        shell: bash

      - name: Run flutter doctor
        run: flutter doctor -v
        shell: bash

      - name: Get Dependencies
        run: flutter pub get
        shell: bash

      - name: Build for Linux
        run: flutter build linux --release --obfuscate --split-debug-info=./build/Debug_Symbols/Linux_x64/
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Linux x64 Executable
          path: build/linux/x64/release/bundle/*

      - name: Upload Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: Linux x64 Debug Symbols
          path: build/Debug_Symbols/Linux_x64/*

  build-for-android:
    name: Build for Android
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Run flutter doctor
        run: flutter doctor -v
        shell: bash

      - name: Get Dependencies
        run: flutter pub get
        shell: bash

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> ./android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> ./android/key.properties
          echo "keyAlias=Bitscoper_Cyber_ToolBox" >> ./android/key.properties
          echo "storeFile=./KeyStore.jks" >> ./android/key.properties
        shell: bash

      - name: Create keystore
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > ./android/app/KeyStore.jks
        shell: bash

      - name: Build appbundle
        run: flutter build appbundle --release --obfuscate --split-debug-info=./build/Debug_Symbols/Android/appbundle/
        shell: bash

      - name: Build APKs
        run: flutter build apk --split-per-abi --release --obfuscate --split-debug-info=./build/Debug_Symbols/Android/APKs/
        shell: bash

      - name: Upload Build Artifacts (appbundle)
        uses: actions/upload-artifact@v4
        with:
          name: Android appbundle
          path: build/app/outputs/bundle/release/*

      - name: Upload Build Artifacts (APKs)
        uses: actions/upload-artifact@v4
        with:
          name: Android APKs
          path: build/app/outputs/flutter-apk/*

      - name: Upload Debug Symbols (appbundle)
        uses: actions/upload-artifact@v4
        with:
          name: Android appbundle Debug Symbols
          path: build/Debug_Symbols/Android/appbundle/*

      - name: Upload Debug Symbols (APKs)
        uses: actions/upload-artifact@v4
        with:
          name: Android APK Debug Symbols
          path: build/Debug_Symbols/Android/APKs/*

  build-for-macos:
    name: Build for macOS
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Run flutter doctor
        run: flutter doctor -v

      - name: Get Dependencies
        run: flutter pub get

      - name: Build for macOS
        run: flutter build macos --release --obfuscate --split-debug-info=./build/Debug_Symbols/macOS/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macOS Executable
          path: build/macos/Build/Products/Release/*.app

      - name: Upload Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: macOS Debug Symbols
          path: build/Debug_Symbols/macOS/*

